{% extends 'layout.html' %} 
{% block content %}
<main class="flex-grow bg-gray-50 flex items-center justify-center min-h-screen font-sans px-4">
  <div class="max-w-lg w-full text-center space-y-8">
    
    <div class="relative inline-flex items-center justify-center w-32 h-32 bg-red-100 rounded-full shadow-inner">
      <svg class="w-16 h-16 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      <span class="absolute top-0 left-0 w-full h-full rounded-full bg-red-400 opacity-20 animate-ping"></span>
    </div>

    <div>
      <h1 class="text-7xl font-extrabold text-gray-900 tracking-tight">404</h1>
      <h2 class="text-2xl font-bold text-gray-800 mt-4">Destination Unknown</h2>
      <p class="text-gray-500 mt-3 leading-relaxed">
        We scanned this URL, and it looks like a dead end. The page you are looking for has been moved, deleted, or never existed.
      </p>
    </div>

    <div class="pt-4">
      <a href="/" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-semibold rounded-lg text-white bg-blue-600 hover:bg-blue-700 shadow-sm transition-all duration-200 hover:-translate-y-0.5">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Return to Secure Scanner
      </a>
    </div>

  </div>
</main>
{% endblock %}
